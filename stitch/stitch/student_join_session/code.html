<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Join ClassPulse Session</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f7f9ff;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .pulse-input:focus {
            box-shadow: 0 10px 15px -3px rgba(37, 49, 83, 0.1), 0 4px 6px -4px rgba(37, 49, 83, 0.1);
            outline: none;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "surface-bright": "#f7f9ff",
              "tertiary-fixed-dim": "#b6cad2",
              "on-primary": "#ffffff",
              "inverse-on-surface": "#eef1f8",
              "surface-container-low": "#f1f4fb",
              "on-secondary-container": "#606474",
              "on-error": "#ffffff",
              "on-error-container": "#93000a",
              "on-surface-variant": "#45464e",
              "on-secondary-fixed-variant": "#424655",
              "surface-variant": "#dfe2e9",
              "on-tertiary": "#ffffff",
              "inverse-surface": "#2d3136",
              "on-background": "#181c21",
              "surface": "#f7f9ff",
              "on-surface": "#181c21",
              "on-tertiary-fixed-variant": "#374951",
              "on-primary-fixed": "#0d1a3b",
              "error-container": "#ffdad6",
              "primary": "#253153",
              "on-tertiary-fixed": "#0b1e24",
              "error": "#ba1a1a",
              "surface-dim": "#d7dae1",
              "surface-container-highest": "#dfe2e9",
              "surface-container-high": "#e5e8ef",
              "secondary-fixed-dim": "#c2c6d8",
              "on-secondary": "#ffffff",
              "outline-variant": "#c6c6cf",
              "on-primary-container": "#abb7e0",
              "on-secondary-fixed": "#171b28",
              "secondary": "#5a5e6e",
              "secondary-container": "#dee2f5",
              "inverse-primary": "#b9c5ef",
              "tertiary-fixed": "#d2e6ef",
              "background": "#f7f9ff",
              "surface-tint": "#515d82",
              "secondary-fixed": "#dee2f5",
              "on-primary-fixed-variant": "#3a4669",
              "primary-fixed-dim": "#b9c5ef",
              "tertiary": "#23353c",
              "tertiary-container": "#3a4c53",
              "outline": "#76767f",
              "surface-container-lowest": "#ffffff",
              "surface-container": "#ebeef5",
              "primary-container": "#3c486b",
              "primary-fixed": "#dae1ff",
              "on-tertiary-container": "#a8bcc4"

            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Plus Jakarta Sans"],
              "label": ["Plus Jakarta Sans"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface selection:bg-primary-fixed selection:text-primary min-h-screen flex flex-col">
<!-- Top Navigation Anchor -->
<header class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-6 py-4 bg-[#f7f9ff] dark:bg-slate-900">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-[#253153] dark:text-slate-100 text-2xl" data-icon="sensors">sensors</span>
<h1 class="font-plus-jakarta-sans text-lg font-bold tracking-tight text-[#253153] dark:text-slate-100">ClassPulse Session</h1>
</div>
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center overflow-hidden hover:bg-slate-200/50 transition-colors cursor-pointer group">
<span class="material-symbols-outlined text-secondary group-active:scale-95 duration-150" data-icon="account_circle">account_circle</span>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow flex items-center justify-center px-6 pt-24 pb-12 relative overflow-hidden">
<!-- Abstract Background Illustration Elements -->
<div class="absolute top-20 -left-20 w-64 h-64 bg-primary-fixed opacity-20 rounded-full blur-3xl"></div>
<div class="absolute bottom-10 -right-20 w-80 h-80 bg-tertiary-fixed opacity-30 rounded-full blur-3xl"></div>
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 pointer-events-none opacity-10">
<svg fill="none" height="600" viewbox="0 0 600 600" width="600" xmlns="http://www.w3.org/2000/svg">
<circle class="text-primary" cx="300" cy="300" r="250" stroke="currentColor" stroke-dasharray="10 20" stroke-width="2"></circle>
<path class="text-secondary" d="M100 300C100 200 200 100 300 100" stroke="currentColor" stroke-linecap="round" stroke-width="4"></path>
<rect class="text-tertiary-fixed-dim" fill="currentColor" height="40" rx="8" transform="rotate(15 400 150)" width="40" x="400" y="150"></rect>
</svg>
</div>
<div class="w-full max-w-md z-10">
<!-- Hero Header Section -->
<div class="text-center mb-12">
<div class="inline-flex items-center justify-center p-4 bg-surface-container-lowest rounded-xl mb-6 shadow-sm relative group">
<div class="absolute -top-3 -right-3 px-3 py-1 bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] font-bold tracking-widest uppercase rounded-full border-4 border-surface">LIVE</div>
<span class="material-symbols-outlined text-primary text-5xl" data-icon="cast_connected">cast_connected</span>
</div>
<h2 class="text-display-sm font-extrabold text-on-surface tracking-tight mb-3">Join ClassPulse Session</h2>
<p class="text-on-surface-variant font-medium leading-relaxed max-w-[280px] mx-auto">Enter your classroom's unique code to start participating.</p>
</div>
<!-- Interaction Card -->
<div class="glass-card p-8 rounded-xl shadow-sm border border-outline-variant/10 space-y-8">
<!-- Large 4-Digit Code Input -->
<div class="space-y-4">
<label class="block text-center text-label-md font-bold text-secondary tracking-[0.1em] uppercase">Session Code</label>
<div class="flex justify-between gap-3">
<input class="pulse-input w-16 h-20 text-center text-3xl font-extrabold text-primary bg-surface-container-lowest rounded-xl border-none shadow-[0_4px_0_0_#ebeef5] focus:shadow-[0_4px_0_0_#253153] transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="pulse-input w-16 h-20 text-center text-3xl font-extrabold text-primary bg-surface-container-lowest rounded-xl border-none shadow-[0_4px_0_0_#ebeef5] focus:shadow-[0_4px_0_0_#253153] transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="pulse-input w-16 h-20 text-center text-3xl font-extrabold text-primary bg-surface-container-lowest rounded-xl border-none shadow-[0_4px_0_0_#ebeef5] focus:shadow-[0_4px_0_0_#253153] transition-all" maxlength="1" placeholder="•" type="text"/>
<input class="pulse-input w-16 h-20 text-center text-3xl font-extrabold text-primary bg-surface-container-lowest rounded-xl border-none shadow-[0_4px_0_0_#ebeef5] focus:shadow-[0_4px_0_0_#253153] transition-all" maxlength="1" placeholder="•" type="text"/>
</div>
</div>
<!-- Action Buttons -->
<div class="space-y-4">
<button class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-white font-bold text-lg rounded-full shadow-lg shadow-primary/20 hover:scale-[1.02] active:scale-95 transition-all flex items-center justify-center gap-2 group">
                        Join Session
                        <span class="material-symbols-outlined group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
<div class="flex items-center gap-4 py-2">
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
<span class="text-label-sm font-bold text-secondary uppercase tracking-widest">or</span>
<div class="h-[1px] flex-grow bg-outline-variant/30"></div>
</div>
<button class="w-full py-4 px-6 bg-secondary-container text-on-secondary-container font-bold rounded-full hover:bg-surface-container-highest transition-colors flex items-center justify-center gap-2">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>
                        Scan QR Code
                    </button>
</div>
</div>
<!-- Footer Meta -->
<div class="mt-8 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 px-4 py-2 bg-surface-container-low rounded-full">
<div class="w-2 h-2 rounded-full bg-tertiary-fixed-dim animate-pulse"></div>
<p class="text-label-sm font-semibold text-secondary">Awaiting classroom signal...</p>
</div>
<button class="text-primary font-bold text-sm hover:underline decoration-2 underline-offset-4">Need help finding the code?</button>
</div>
</div>
</main>
<!-- Illustrative Bottom Decoration -->
<div class="mt-auto w-full max-w-lg mx-auto overflow-hidden opacity-40">
<img class="w-full h-auto object-cover grayscale mix-blend-multiply" data-alt="whimsical line drawing of students sitting in a modern open-concept classroom with digital floating screens and soft pastel color accents" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCR6nLmV-xGNFe-Fc2pSejvw3MVakHF5Tw64DFOMBaNapBAusTcZonjTmJaNPQR8xSYU2z8UeZEQqtbtsxsvoWmK_MD23GKkK4ZEXhLdWCIQ-AoGK_iNfrPL0cn_nzKAOr29_7hsPR01-7z2caY_ZCyRPkbDJFOb-Qw7s_ZrD8IXcTei-YXH-N_qNoKf1Tn-BBxFN9ZJeq9k__SZ0f8nib8Erxg2RhvwStLOVLHPQ8gq4_AMzQxT5KA2U6Eqm0S4MitGXWQ_t50JkA"/>
</div>
</body></html>
